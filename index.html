<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Peligro de incendios forestales</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.0.6/dist/pmtiles.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="ui">
      <div class="ui-inner">
        <div class="ui-left">
          <div class="map-title-block">
            <div>
              <h1 class="map-title">Peligro de incendios forestales</h1>
              <p class="map-subtitle">AEMET</p>
            </div>
          </div>
        </div>
        <div class="ui-right">
          <div class="leyenda" id="leyenda-niveles">
            <span class="leyenda-item"><span class="leyenda-dot" style="background:#4b96e3"></span>Muy bajo</span>
            <span class="leyenda-item"><span class="leyenda-dot" style="background:#51d1f6"></span>Bajo</span>
            <span class="leyenda-item"><span class="leyenda-dot" style="background:#57e520"></span>Moderado</span>
            <span class="leyenda-item"><span class="leyenda-dot" style="background:#f9fb2f"></span>Alto</span>
            <span class="leyenda-item"><span class="leyenda-dot" style="background:#ef8504"></span>Muy alto</span>
            <span class="leyenda-item"><span class="leyenda-dot" style="background:#f52300"></span>Extremo</span>
          </div>
        </div>
      </div>
    </header>
    <main id="map"></main>
  </div>

  <!-- Calendario de días de predicción -->
  <div id="dia-calendario">
    <button id="reset-btn" class="calendario-reset" title="Volver al inicio">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
      </svg>
    </button>
    <div id="dia-pills" class="calendario-dias"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
